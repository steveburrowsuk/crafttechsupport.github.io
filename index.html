
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LaserSteve | Coming Soon</title>

<style>

:root{
--bg-dark:#071426;
--bg-light:#f4f7fb;
--card-dark:#0f2f5e;
--card-light:#ffffff;
--text-dark:#ffffff;
--text-light:#111;
--accent:#25D366;
}

body{
margin:0;
font-family:Arial;
background:var(--bg-dark);
color:var(--text-dark);
display:flex;
align-items:center;
justify-content:center;
height:100vh;
transition:.3s;
}

body.light{
background:var(--bg-light);
color:var(--text-light);
}

.card{
background:var(--card-dark);
padding:40px;
border-radius:16px;
text-align:center;
width:420px;
box-shadow:0 20px 40px rgba(0,0,0,.35);
}

body.light .card{
background:var(--card-light);
}

.logo{
max-width:340px;
margin-bottom:20px;
}

.btn{
display:inline-block;
margin-top:18px;
padding:12px 20px;
border-radius:8px;
background:var(--accent);
color:white;
text-decoration:none;
font-weight:bold;
}

.toggle{
position:fixed;
top:15px;
right:15px;
cursor:pointer;
padding:6px 10px;
background:#ccc;
border-radius:6px;
font-size:12px;
}

.footer{
margin-top:12px;
font-size:14px;
opacity:.8;
}

</style>

</head>

<body>

<div class="toggle" onclick="toggleMode()">mode</div>

<div class="card">

<img src="laser-steve-logo.png" class="logo">

<p>Laser support, LightBurn training and craft machine help</p>

<div class="footer">
www.crafttechsupport.co.uk<br>
hello@lasersteve.co.uk
</div>

<a class="btn" href="https://wa.me/447000000000">
WhatsApp
</a>

</div>

<script>
function toggleMode(){
document.body.classList.toggle("light")
}
</script>

</body>
</html>
